<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lähellä.fi - Tapahtumavahti V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .status { width: 100%; font-weight: bold; color: #d9534f; margin-bottom: 10px; padding: 10px; background: #f9f9f9; border-left: 5px solid #0056b3; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #0056b3; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .btn-names { background: #f0ad4e; }
        .btn-excel { background: #007bff; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lähellä.fi - Tapahtumavahti V3</h1>
    
    <div id="statusText" class="status">Valmis. Aloita painamalla "Päivitä ilmoitukset".</div>

    <div class="controls">
        <select id="typeFilter">
            <option value="support">Tuki ja apu</option>
            <option value="hobby">Harrastukset</option>
            <option value="voluntary">Vapaaehtoistoiminta</option>
        </select>
        <button id="fetchBtn" onclick="fetchActivities()">1. Päivitä ilmoitukset</button>
        <button id="namesBtn" class="btn-names" onclick="fetchGroupNames()" disabled>2. Hae järjestöjen nimet</button>
        <button id="exportBtn" class="btn-excel" onclick="exportToExcel()" disabled>3. Lataa Exceliin</button>
    </div>

    <div style="overflow-x: auto; max-height: 600px; border: 1px solid #ddd;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Nimi</th>
                    <th>Järjestäjä (ID/Nimi)</th>
                    <th>Tapa</th>
                    <th>Postinumerot</th>
                    <th>Kaupunki</th>
                    <th>Linkki</th>
                </tr>
            </thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>
</div>

<script>
    let allData = [];
    let groupCache = {};
    const PROXY = "https://corsproxy.io/?";

    async function fetchActivities() {
        const type = document.getElementById('typeFilter').value;
        const status = document.getElementById('statusText');
        const btn = document.getElementById('fetchBtn');
        
        allData = [];
        document.getElementById('dataBody').innerHTML = "";
        btn.disabled = true;
        
        let offset = 0;
        let hasMore = true;

        try {
            while (hasMore && offset < 5000) {
                status.innerText = `Haetaan ilmoituksia... (Ladattu: ${offset})`;
                const url = `https://www.lahella.fi/v1/integration/activities?type=${type}&offset=${offset}`;
                const res = await fetch(PROXY + encodeURIComponent(url));
                const json = await res.json();
                const items = json.items || [];

                items.forEach(item => {
                    const traits = item.traits || {};
                    let types = new Set();
                    let codes = new Set();
                    let cities = new Set();

                    (traits.channels || []).forEach(ch => {
                        if (ch.type) ch.type.forEach(t => types.add(t));
                        if (ch.address?.postalCode) codes.add(ch.address.postalCode);
                        if (ch.address?.city) cities.add(ch.address.city);
                    });

                    allData.push({
                        "Nimi": traits.name || "Nimetön",
                        "Järjestäjä": item.group, // Aluksi vain ID
                        "Tapa": Array.from(types).join(", "),
                        "Postinumerot": Array.from(codes).join(", "),
                        "Kaupunki": Array.from(cities).join(", "),
                        "Linkki": `https://www.lahella.fi/activities/${item._key}`,
                        "groupId": item.group
                    });
                });

                renderTable();
                offset += items.length;
                hasMore = json.hasMore === true && items.length > 0;
            }
            status.innerText = `Lataus valmis! Mukana ${allData.length} ilmoitusta. Voit nyt hakea nimet tai ladata Excelin.`;
            document.getElementById('namesBtn').disabled = false;
            document.getElementById('exportBtn').disabled = false;
        } catch (e) {
            status.innerText = "Virhe: " + e.message + ". Kokeile päivittää sivu.";
        } finally { btn.disabled = false; }
    }

    async function fetchGroupNames() {
        const status = document.getElementById('statusText');
        const btn = document.getElementById('namesBtn');
        btn.disabled = true;

        const uniqueGroups = [...new Set(allData.map(d => d.groupId))];
        let count = 0;

        for (let id of uniqueGroups) {
            if (id && !groupCache[id]) {
                try {
                    status.innerText = `Haetaan nimiä... (${count++} / ${uniqueGroups.length})`;
                    const url = `https://www.lahella.fi/v1/integration/groups/${id}`;
                    const res = await fetch(PROXY + encodeURIComponent(url));
                    const json = await res.json();
                    groupCache[id] = json.name || id;
                } catch (e) { groupCache[id] = id; }
            }
        }

        allData.forEach(d => { if (groupCache[d.groupId]) d["Järjestäjä"] = groupCache[d.groupId]; });
        renderTable();
        status.innerText = "Nimet haettu onnistuneesti!";
        btn.disabled = false;
    }

    function renderTable() {
        const body = document.getElementById('dataBody');
        body.innerHTML = allData.map(d => `
            <tr>
                <td><b>${d["Nimi"]}</b></td>
                <td>${d["Järjestäjä"]}</td>
                <td>${d["Tapa"]}</td>
                <td>${d["Postinumerot"]}</td>
                <td>${d["Kaupunki"]}</td>
                <td><a href="${d["Linkki"]}" target="_blank">Avaa</a></td>
            </tr>
        `).join('');
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(allData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Lahella_Data.xlsx");
    }
</script>
</body>
</html>
